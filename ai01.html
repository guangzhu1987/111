<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即梦驱动 | 专业制片分镜流水线 (V42 模型升级版)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #00f2fe; --border: #222; --role-color: #ff4d4f; --scene-color: #3b82f6; --dialogue-color: #4ade80; --narration-color: #a78bfa; --system-color: #facc15; --time-color: #00f2fe; --stop-color: #f43f5e; }
        body { background: var(--bg); color: #ffffff; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 15px; background: #080808; border-bottom: 2px solid var(--border); }
        .project-select { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 4px; font-size: 13px; margin-bottom: 8px; outline: none; }

        /* 设置面板 */
        .settings-panel { background: #0a0a0a; padding: 15px; border-bottom: 1px solid var(--border); display: none; }
        .settings-panel.active { display: block; }
        .setting-item { margin-bottom: 10px; }
        .setting-item label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        .setting-input { width: 100%; background: #151515; border: 1px solid #333; color: #fff; padding: 6px; border-radius: 4px; font-size: 11px; box-sizing: border-box; outline: none; }

        /* 资产列表 */
        .asset-list { flex: 1; overflow-y: auto; padding: 15px; }
        .asset-card { background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; border-left: 4px solid transparent; }
        .asset-card.role { border-left-color: var(--role-color); } 
        .asset-card.scene { border-left-color: var(--scene-color); }
        
        .asset-img-box { width: 100%; height: 180px; background: #0a0a0a; border-radius: 6px; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #222; position: relative; }
        .asset-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color: var(--accent); text-align: center; }

        .asset-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .asset-title { font-size: 13px; font-weight: bold; }
        .asset-card textarea { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #999; border-radius: 4px; padding: 8px; font-size: 11px; resize: none; box-sizing: border-box; height: 50px; }

        /* 主工作区 */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; border-right: 1px solid var(--border); }
        .header-bar { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; }
        #novelInput { flex: 1; background: transparent; border: none; color: #ccc; font-size: 15px; padding: 25px; outline: none; line-height: 1.8; resize: none; }

        /* 场记面板 */
        .analysis { width: 620px; background: var(--panel); display: flex; flex-direction: column; }
        .shot-list { flex: 1; overflow-y: auto; padding: 20px; }
        .segment-block { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .field-row { margin-bottom: 15px; }
        .field-name { font-size: 10px; color: #555; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .field-name::after { content: ""; flex: 1; height: 1px; background: #222; }
        .field-content { font-size: 13px; color: #eee; line-height: 1.6; background: #080808; padding: 10px; border-radius: 6px; border: 1px solid #111; }

        .progress-container { height: 4px; background: #1a1a1a; width: 100%; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }

        .btn { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .btn:disabled { opacity: 0.3; }
        
        .shot-item { font-size: 14px; color: #ddd; padding: 12px 0; border-bottom: 1px dashed #222; cursor: pointer; line-height: 1.7; }
        .timestamp-badge { background: rgba(0, 242, 254, 0.1); color: var(--time-color); padding: 1px 6px; border-radius: 3px; font-weight: bold; margin-right: 8px; font-family: monospace; border: 1px solid rgba(0, 242, 254, 0.2); }
        .color-role { color: var(--role-color); font-weight: bold; }
        .color-scene { color: var(--scene-color); font-weight: bold; }
        .color-dialogue { color: var(--dialogue-color); font-weight: bold; }
        .color-narration { color: var(--narration-color); font-weight: bold; }
        .color-system { color: var(--system-color); font-weight: bold; }

        #msgBanner { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 10px 30px; border-radius: 30px; font-size: 13px; font-weight: bold; display: none; text-align: center; }

        /* 模型选择框 */
        .model-select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 7px; border-radius: 6px; font-size: 12px; outline: none; cursor: pointer; transition: 0.2s; }
        .model-select:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="msgBanner"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-size: 11px; color: var(--accent); font-weight: 800;">JIMENG PRODUCTION V42</span>
                <button class="btn" style="padding:4px 8px; font-size:10px; background:#222; color:#888;" onclick="toggleSettings()">设置代理</button>
            </div>
            
            <div id="jimengSettings" class="settings-panel">
                <div class="setting-item"><label>代理服务器地址</label><input type="text" id="proxy_url" class="setting-input" value="http://localhost:3000/proxy/jimeng"></div>
                <div class="setting-item"><label>sessionid *</label><input type="password" id="cookie_sessionid" class="setting-input"></div>
                <div class="setting-item"><label>_tea_web_id *</label><input type="text" id="cookie_tea" class="setting-input"></div>
                <div class="setting-item"><label>uid_tt *</label><input type="text" id="cookie_uid" class="setting-input"></div>
                <button class="btn" style="width:100%; justify-content:center;" onclick="saveJimengSettings()">保存配置</button>
            </div>

            <select id="projectSelect" class="project-select" onchange="switchProject()"></select>
            <button class="btn" style="width:100%; background:#1a1a1a; color:#fff; border:1px solid #333; justify-content:center;" onclick="createNewProject()">+ 新建项目</button>
        </div>
        <div id="assetLibrary" class="asset-list"></div>
    </aside>

    <main class="main-content">
        <div class="header-bar">
            <div style="display:flex; gap:8px; align-items:center;">
                <select id="modelSelect" class="model-select" onchange="saveModelConfig()">
                    <option value="deepseek-v3.2">DeepSeek-V3.2 (正式版)</option>
                    <option value="deepseek-v3.2-speciale">DeepSeek-V3.2-Speciale (思考模式)</option>
                    <option value="deepseek-chat">DeepSeek-V3 (通用)</option>
                </select>
                <input type="text" id="styleInput" class="style-input" style="background:#1a1a1a; border:1px solid #333; color:#facc15; padding:8px; border-radius:6px; font-size:12px; width:130px;" placeholder="设定全剧风格">
                <input type="password" id="apiKey" style="background:#1a1a1a; border:1px solid #333; color:var(--accent); padding:8px; border-radius:6px; font-size:12px; width:120px;" placeholder="DeepSeek Key">
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn" id="startBtn" onclick="startWorkflow()"><i class="fa-solid fa-play"></i> 解析生产</button>
                <button class="btn" style="background:var(--stop-color); color:#fff;" id="stopBtn" onclick="stopWorkflow()" disabled><i class="fa-solid fa-stop"></i></button>
            </div>
        </div>
        <div class="progress-container"><div id="progressFill" class="progress-fill"></div></div>
        <div style="padding:10px 20px; background:#080808; display:flex; justify-content:space-between; font-size:11px; color:#555;">
            <span id="progressText">系统就绪</span>
            <span id="percentText">0 / 0</span>
        </div>
        <textarea id="novelInput" placeholder="在此粘贴剧本原稿..."></textarea>
    </main>

    <section class="analysis">
        <div style="padding:15px 20px; border-bottom:1px solid var(--border); font-weight:bold; color:var(--accent);"><i class="fa-solid fa-film"></i> 场记面板 (V41 物理熔断加固)</div>
        <div id="shotList" class="shot-list"></div>
    </section>

<script>
    const storage = {
        get: (k) => localStorage.getItem(k),
        set: (k, v) => localStorage.setItem(k, v)
    };

    let appData = { projects: {}, currentId: null };
    let globalAssets = { rawRoles: {}, rawScenes: {}, orderedAssets: [] };
    let rawSegmentsLog = [];
    let isAnalyzing = false;
    let sceneQueue = [];
    let currentIdx = 0;

    window.onload = () => {
        document.getElementById('apiKey').value = storage.get('jimeng_api_key_v19') || '';
        document.getElementById('styleInput').value = storage.get('jimeng_style_v19') || '';
        document.getElementById('cookie_sessionid').value = storage.get('jimeng_cookie_sessionid') || '';
        document.getElementById('cookie_tea').value = storage.get('jimeng_cookie_tea') || '';
        document.getElementById('cookie_uid').value = storage.get('jimeng_cookie_uid') || '';
        document.getElementById('proxy_url').value = storage.get('jimeng_proxy_url') || 'http://localhost:3000/proxy/jimeng';
        document.getElementById('modelSelect').value = storage.get('jimeng_model_v41') || 'deepseek-v3.2';
        initSystem();
    };

    function initSystem() {
        const saved = storage.get('jimeng_data_v40');
        if(saved) {
            try { appData = JSON.parse(saved); } catch(e) { createDefaultProj(); }
        } else { createDefaultProj(); }
        refreshProjectUI(); loadProject();
    }

    function createDefaultProj() {
        const id = 'p_' + Date.now();
        appData = { projects: { [id]: { id, name: '新漫剧', text: '', assets: { rawRoles: {}, rawScenes: {}, orderedAssets: [] }, segments: [] } }, currentId: id };
    }

    function notify(msg, type = "error") {
        const b = document.getElementById('msgBanner');
        b.innerHTML = msg; b.style.display = 'block';
        b.style.background = type === "error" ? 'var(--stop-color)' : 'var(--accent)';
        b.style.color = type === "error" ? '#fff' : '#000';
        if(type !== "keep") setTimeout(() => b.style.display = 'none', 5000);
    }

    function toggleSettings() { document.getElementById('jimengSettings').classList.toggle('active'); }
    function saveJimengSettings() {
        storage.set('jimeng_cookie_sessionid', document.getElementById('cookie_sessionid').value);
        storage.set('jimeng_cookie_tea', document.getElementById('cookie_tea').value);
        storage.set('jimeng_cookie_uid', document.getElementById('cookie_uid').value);
        storage.set('jimeng_proxy_url', document.getElementById('proxy_url').value);
        notify("配置已保存", "success"); toggleSettings();
    }

    function saveModelConfig() {
        storage.set('jimeng_model_v41', document.getElementById('modelSelect').value);
    }

    function saveAll() {
        if(!appData.currentId || !appData.projects[appData.currentId]) return;
        const cur = appData.projects[appData.currentId];
        cur.text = document.getElementById('novelInput').value;
        cur.assets = JSON.parse(JSON.stringify(globalAssets));
        cur.segments = JSON.parse(JSON.stringify(rawSegmentsLog));
        storage.set('jimeng_data_v40', JSON.stringify(appData));
    }

    function refreshProjectUI() {
        const sel = document.getElementById('projectSelect'); sel.innerHTML = '';
        Object.values(appData.projects).forEach(p => {
            const opt = document.createElement('option'); opt.value = p.id; opt.innerText = p.name;
            if(p.id === appData.currentId) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    function createNewProject() {
        const n = prompt("项目名:"); if(!n) return;
        saveAll(); const id = 'p_' + Date.now();
        appData.projects[id] = { id, name: n, text: '', assets: { rawRoles: {}, rawScenes: {}, orderedAssets: [] }, segments: [] };
        appData.currentId = id; refreshProjectUI(); loadProject();
    }

    function switchProject() { saveAll(); appData.currentId = document.getElementById('projectSelect').value; loadProject(); }

    function loadProject() {
        const p = appData.projects[appData.currentId];
        if(!p) return;
        document.getElementById('novelInput').value = p.text || '';
        globalAssets = p.assets || { rawRoles: {}, rawScenes: {}, orderedAssets: [] };
        rawSegmentsLog = p.segments || [];
        renderAssets(); renderShots();
    }

    async function startWorkflow() {
        const text = document.getElementById('novelInput').value;
        const key = document.getElementById('apiKey').value;
        const style = document.getElementById('styleInput').value;
        if(!text || !key || !style) return notify("画风、Key、剧本均为必填！");

        storage.set('jimeng_api_key_v19', key); storage.set('jimeng_style_v19', style);
        sceneQueue = text.split(/(?=^(?:场景|画面|Scene)\s*\d+|【场景|画面\d*】.*$)/m).map(s => s.trim()).filter(s => s.length > 5);
        if(sceneQueue.length === 0) return notify("未检测到有效场景标识。");

        currentIdx = 0; rawSegmentsLog = [];
        document.getElementById('shotList').innerHTML = '';
        isAnalyzing = true; document.getElementById('startBtn').disabled = true; document.getElementById('stopBtn').disabled = false;
        runNext(key, style);
    }

    function stopWorkflow() { isAnalyzing = false; document.getElementById('startBtn').disabled = false; document.getElementById('stopBtn').disabled = true; }

    async function runNext(key, style) {
        if(!isAnalyzing) return;
        if(currentIdx >= sceneQueue.length) { stopWorkflow(); return notify("解析成功完毕", "success"); }

        document.getElementById('progressFill').style.width = Math.round(((currentIdx + 1) / sceneQueue.length) * 100) + '%';
        document.getElementById('progressText').innerText = `执行 V41 物理熔断加固生产: ${currentIdx+1}/${sceneQueue.length}`;

        // V42 模型配置逻辑
        const selectedModel = document.getElementById('modelSelect').value;
        let apiUrl = "https://api.deepseek.com/chat/completions";
        let modelParam = selectedModel;

        if (selectedModel === 'deepseek-v3.2-speciale') {
            apiUrl = "https://api.deepseek.com/v3.2_speciale_expires_on_20251215/chat/completions";
        }

        const PROMPT = `你是一位顶级导演，严苛遵守工业化漫剧生产准则。

        【导演生产指令集 - V41 物理熔断版】
        一、 视听全要素逻辑（绝对禁令）
        1. 👉 **物理熔断（最高权重）**：单镜头内的文本（对白“”、系统提示【】、旁白（））总字数上限 = 镜头秒数 * 4。
        2. 👉 **严禁违规**：禁止在 1 秒内塞入超过 5 个汉字。如果对白很长，必须将其拆分为多个连续镜头（Shots）。
        3. 👉 **剧情闭环**：必须衔接前文，确保所有“发问”都有具体的“文本回应”。

        二、 镜头调度（快切模式）
        1. 👉 **每分段强制 4-6 镜**：每个 13.0s 分段必须由多个短镜头构成，节奏紧凑。
        2. 👉 **动态组合**：镜头开头必须是 [景别+运镜] 组合（如 [特写推近]、[俯拍旋转]）。
        3. 👉 **环境反馈**：动作必须符合物理因果（气流带动微尘、身体遮挡光束）。

        三、 工业 6 大类输出字段
        人物特征（巅峰外貌）、场景建模（空间物理描述）、光影氛围、镜头语言、固定风格、画面限制。

        【JSON 模板】
        {
          "segments": [{
              "title": "场景标题",
              "roles": [{"name":"沈逸", "desc":"外貌特征描述"}],
              "scenes": [{"name":"地点", "desc":"物理底座描述"}],
              "lighting": "光源方向与色温",
              "shots": [
                {"text":"[0~3.0s] [特写推近] 聚焦沈逸唇部动作。 “这是第一句对白。” "},
                {"text":"[3.0~8.0s] [中景平移] 系统光屏缓缓展开，文字滚动。 【这里是长段的系统提示文字，必须占据足够时长以符合熔断规则】 "}
              ],
              "style": "${style}",
              "limit": "无文字"
          }],
          "empty_scenes": [{"name":"地点", "prompt":"AI环境提示词"}],
          "detected_roles": [{"name":"角色", "prompt":"AI人物颜值提示词"}]
        }`;

        try {
            const resp = await fetch(apiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
                body: JSON.stringify({ 
                    model: modelParam, 
                    messages: [{ role: "system", content: PROMPT }, { role: "user", content: sceneQueue[currentIdx] }], 
                    response_format: { type: "json_object" }, 
                    temperature: 0.1 
                })
            });
            const data = await resp.json();
            const result = JSON.parse(data.choices[0].message.content.trim().match(/\{[\s\S]*\}/)[0]);
            
            updateLogic(result);
            if(result.segments) result.segments.forEach(s => { s.sceneNum = currentIdx + 1; rawSegmentsLog.push(s); });
            renderAssets(); renderShots(); saveAll();
            currentIdx++;
            if(isAnalyzing) setTimeout(() => runNext(key, style), 1200);
        } catch(e) { notify("解析异常: " + e.message); stopWorkflow(); }
    }

    function updateLogic(res) {
        if(res.detected_roles) res.detected_roles.forEach(r => {
            const n = r.name.replace(/^[@#]+/, '');
            if(!globalAssets.rawRoles[n]) { globalAssets.rawRoles[n] = { prompt: r.prompt, img: null }; globalAssets.orderedAssets.push({ type: 'role', name: n }); }
            else globalAssets.rawRoles[n].prompt = r.prompt;
        });
        if(res.empty_scenes) res.empty_scenes.forEach(s => {
            const n = s.name.replace(/^[@#]+/, '');
            if(!globalAssets.rawScenes[n]) { globalAssets.rawScenes[n] = { prompt: s.prompt, img: null }; globalAssets.orderedAssets.push({ type: 'scene', name: n }); }
            else globalAssets.rawScenes[n].prompt = s.prompt;
        });
    }

    function renderAssets() {
        const lib = document.getElementById('assetLibrary'); lib.innerHTML = '';
        if (globalAssets.orderedAssets.length === 0) { lib.innerHTML = `<div style="text-align:center; color:#333; margin-top:50px; font-size:12px;">等待资产提取...</div>`; return; }
        globalAssets.orderedAssets.forEach((a, i) => {
            const data = a.type === 'role' ? globalAssets.rawRoles[a.name] : globalAssets.rawScenes[a.name];
            lib.innerHTML += `<div class="asset-card ${a.type}" id="card-${a.name}">
                <div class="asset-img-box">${data.img ? `<img src="${data.img}" onclick="window.open(this.src)">` : `<i class="fa-solid fa-image-portrait placeholder"></i>`}
                    <div class="loading-overlay"><i class="fa-solid fa-spinner fa-spin"></i><div class="st" style="margin-top:8px;"></div></div></div>
                <div class="asset-header"><span class="asset-title ${a.type==='role'?'color-role':'color-scene'}">${a.name}</span>
                    <div style="display:flex; gap:4px;"><button class="gen-btn" onclick="paint('${a.name}', '${a.type}')">绘图</button><button class="gen-btn" style="border-color:#333; color:#555;" onclick="moveAsset(${i},-1)">↑</button></div></div>
                <textarea onchange="updateAssetPrompt('${a.type}','${a.name}',this.value)">${data.prompt || ""}</textarea></div>`;
        });
    }

    function renderShots() {
        const sL = document.getElementById('shotList'); sL.innerHTML = '';
        rawSegmentsLog.forEach(seg => {
            const b = document.createElement('div'); b.className = 'segment-block';
            let shotItems = (seg.shots || []).map(s => `<div class="shot-item" onclick="copy(this)">${highlight(s.text || "")}</div>`).join('');
            b.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:8px;">
                    <span style="font-weight:bold; color:var(--accent);">${seg.title}</span><span style="font-size:10px; color:#444;">场记 #${seg.sceneNum}</span>
                </div>
                <div class="field-row"><div class="field-name">巅峰人物</div><div class="field-content">${seg.roles?seg.roles.map(r=>`<span class="color-role">${r.name}</span>: ${r.desc}`).join('<br>'):'无'}</div></div>
                <div class="field-row"><div class="field-name">场景建模</div><div class="field-content">${seg.scenes?seg.scenes.map(s=>`<span class="color-scene">${s.name}</span>: ${s.desc}`).join('<br>'):'无'}</div></div>
                <div class="field-row"><div class="field-name">光影氛围</div><div class="field-content">${seg.lighting||'默认'}</div></div>
                <div class="field-row"><div class="field-name">镜头场记 (物理熔断流)</div><div class="field-content" style="background:#080808;">${shotItems}</div></div>
                <div class="field-row"><div class="field-name">固定风格</div><div class="field-content" style="font-size:11px;"><span style="color:#facc15;">${seg.style}</span> | ${seg.limit}</div></div>`;
            sL.appendChild(b);
        });
        sL.scrollTop = sL.scrollHeight;
    }

    function highlight(t) {
        let res = t.replace(/\[\s*\d+(?:\.\d+)?\s*~\s*\d+(?:\.\d+)?s\s*\]/g, m => `<span class="timestamp-badge">${m}</span>`);
        res = res.replace(/\[([^\]]*[景拍推拉平旋转俯仰][^\]]*)\]/g, m => `<span class="color-scene">${m}</span>`);
        globalAssets.orderedAssets.forEach(a => {
            const regex = new RegExp(`(?<![a-zA-Z0-9_-])${a.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(?![a-zA-Z0-9_-])`, 'g');
            res = res.replace(regex, `<span class="${a.type==='role'?'color-role':'color-scene'}">${a.name}</span>`);
        });
        // 渲染对白/旁白/系统提示
        res = res.replace(/[“].*?[”]/g, m => `<span class="color-dialogue">${m}</span>`);
        res = res.replace(/[（\(].*?[）\)]/g, m => `<span class="color-narration">${m}</span>`);
        res = res.replace(/[【].*?[】]/g, m => `<span class="color-system">${m}</span>`);
        return res;
    }

    async function paint(name, type) {
        const sid = storage.get('jimeng_cookie_sessionid'), tea = storage.get('jimeng_cookie_tea'), uid = storage.get('jimeng_cookie_uid'), pUrl = document.getElementById('proxy_url').value;
        if(!sid || !tea || !uid) return notify("请先配置即梦 Cookie！");
        const data = type === 'role' ? globalAssets.rawRoles[name] : globalAssets.rawScenes[name];
        const prompt = (data.prompt || "") + ", " + (document.getElementById('styleInput').value || "");
        const card = document.getElementById(`card-${name}`);
        const overlay = card.querySelector('.loading-overlay'), st = overlay.querySelector('.st');
        
        overlay.style.display = 'flex'; st.innerText = "代理请求中...";
        try {
            const r1 = await fetch(pUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    url: "https://jimeng.jianying.com/api/v1/create_task",
                    method: "POST",
                    headers: { "Cookie": `sessionid=${sid}; _tea_web_id=${tea}; uid_tt=${uid}` },
                    data: { prompt, model_type: "seedance_v2", aspect_ratio: "9:16" }
                })
            });

            const j1 = await r1.json();
            if(j1.error) throw new Error(j1.error);
            const tid = j1.task_id || j1.data?.task_id;
            if(!tid) throw new Error("代理未获取到任务ID");

            let c = 0;
            const p = async () => {
                c++; st.innerText = `AI 正在绘图 ${c*3}s...`;
                const r2 = await fetch(pUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        url: `https://jimeng.jianying.com/api/v1/query_task?task_id=${tid}`,
                        method: "GET",
                        headers: { "Cookie": `sessionid=${sid}; _tea_web_id=${tea}; uid_tt=${uid}` }
                    })
                });
                const j2 = await r2.json();
                const status = j2.status || j2.data?.status;
                if(status ==='success' || status === 'completed') {
                    data.img = j2.image_url || j2.data?.image_url;
                    saveAll(); renderAssets();
                } else if(status ==='failed') throw new Error("即梦绘图失败");
                else setTimeout(p, 3000);
            };
            p();
        } catch(e) { 
            notify(`❌ 代理报错: ${e.message}<br><small>请检查 Node server.js 是否运行且端口正确。</small>`, "keep"); 
            overlay.style.display = 'none'; 
        }
    }

    function moveAsset(i, d) {
        const ti = i + d; if(ti<0||ti>=globalAssets.orderedAssets.length) return;
        [globalAssets.orderedAssets[i], globalAssets.orderedAssets[ti]] = [globalAssets.orderedAssets[ti], globalAssets.orderedAssets[i]];
        saveAll(); renderAssets(); renderShots();
    }
    function updateAssetPrompt(t, n, v) { if(t==='role') globalAssets.rawRoles[n].prompt=v; else globalAssets.rawScenes[n].prompt=v; saveAll(); }
    function copy(el) { navigator.clipboard.writeText(el.innerText); el.style.background = "rgba(0, 242, 254, 0.1)"; setTimeout(() => el.style.background = "transparent", 300); }
</script>
