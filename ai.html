<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>即梦驱动 | 统一序列号制片流水线</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #00f2fe; --border: #222; --role-color: #ff4d4f; --scene-color: #3b82f6; }
        body { background: var(--bg); color: #ffffff; font-family: "PingFang SC", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .editor { flex: 1; display: flex; flex-direction: column; background: #000; border-right: 1px solid var(--border); }
        .analysis { width: 500px; background: var(--panel); display: flex; flex-direction: column; }
        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 14px; background: #0a0a0a; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .project-manager { padding: 15px; background: #080808; border-bottom: 2px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
        .project-select { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 6px; border-radius: 4px; }
        #novelInput { flex: 1; background: transparent; border: none; color: #ccc; font-size: 15px; padding: 25px; outline: none; line-height: 1.8; resize: none; }
        .asset-list { flex: 1; overflow-y: auto; padding: 15px; }
        .asset-card { background: #111; border: 1px solid #222; border-radius: 6px; padding: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .asset-card.role { border-left-color: var(--role-color); }
        .asset-card.scene { border-left-color: var(--scene-color); }
        .shot-list { flex: 1; overflow-y: auto; padding: 20px; }
        .segment-block { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .field-content { font-size: 13px; background: #050505; padding: 10px; border-radius: 4px; margin-top: 5px; color: #ddd; }
        .color-role { color: var(--role-color); font-weight: bold; }
        .color-scene { color: var(--scene-color); font-weight: bold; }
        .btn { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .api-input { background: #1a1a1a; border: 1px solid #333; color: var(--accent); padding: 8px; border-radius: 4px; width: 150px; }
        .progress-bar { height: 4px; background: #1a1a1a; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="project-manager">
            <select id="projectSelect" class="project-select" onchange="switchProject()"></select>
            <button class="btn" style="padding:4px 8px" onclick="createNewProject()">+</button>
        </div>
        <div class="header">全局资产 (统一序列号)</div>
        <div id="assetLibrary" class="asset-list"></div>
    </aside>

    <main class="editor">
        <div class="header">
            <span>剧本原稿</span>
            <div style="display:flex; gap:10px;">
                <input type="password" id="apiKey" class="api-input" placeholder="DeepSeek API Key">
                <button class="btn" id="startBtn" onclick="startSceneWorkflow()">开始解析</button>
            </div>
        </div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <textarea id="novelInput" placeholder="在此粘贴剧本，例如：\n画面1：李白在长安酒肆喝酒...\n画面2：杜甫推门而入..." oninput="autoSave()"></textarea>
    </main>

    <section class="analysis">
        <div class="header">分镜脚本输出</div>
        <div id="shotList" class="shot-list"></div>
    </section>

<script>
    let appData = { projects: {}, currentId: null };

    // 1. 初始化系统
    window.onload = () => {
        const savedData = localStorage.getItem('jimeng_v5');
        if (savedData) {
            appData = JSON.parse(savedData);
        } else {
            createNewProject("新剧集");
        }
        const savedKey = localStorage.getItem('ds_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        refreshProjectUI();
    };

    function createNewProject(name = "未命名项目") {
        const id = 'proj_' + Date.now();
        appData.projects[id] = {
            id, name: name, text: '',
            assets: { roles: {}, scenes: {} },
            shots: []
        };
        appData.currentId = id;
        saveAndRefresh();
    }

    function switchProject() {
        appData.currentId = document.getElementById('projectSelect').value;
        loadCurrentProject();
    }

    function loadCurrentProject() {
        const proj = appData.projects[appData.currentId];
        document.getElementById('novelInput').value = proj.text || '';
        renderAssetLibrary();
        renderShots();
    }

    function autoSave() {
        const proj = appData.projects[appData.currentId];
        proj.text = document.getElementById('novelInput').value;
        save();
    }

    function save() {
        localStorage.setItem('jimeng_v5', JSON.stringify(appData));
    }

    function saveAndRefresh() {
        save();
        refreshProjectUI();
        loadCurrentProject();
    }

    function refreshProjectUI() {
        const select = document.getElementById('projectSelect');
        select.innerHTML = Object.values(appData.projects).map(p => 
            `<option value="${p.id}" ${p.id === appData.currentId ? 'selected' : ''}>${p.name}</option>`
        ).join('');
    }

    // 2. 核心工作流
    async function startSceneWorkflow() {
        const key = document.getElementById('apiKey').value;
        const text = document.getElementById('novelInput').value;
        if (!key) return alert("请填入 DeepSeek API Key");
        localStorage.setItem('ds_key', key);

        const segments = text.split(/(?=画面\d+|场景\d+|第\d+场)/g).filter(s => s.trim());
        const proj = appData.projects[appData.currentId];
        proj.shots = []; 

        document.getElementById('startBtn').disabled = true;
        for (let i = 0; i < segments.length; i++) {
            updateProgress(i, segments.length);
            await processSegment(segments[i], i + 1, key);
        }
        updateProgress(1, 1);
        document.getElementById('startBtn').disabled = false;
        saveAndRefresh();
    }

    async function processSegment(rawText, index, key) {
        const prompt = `解析分镜：提取角色、场景、画面描述。JSON格式：{"roles":["名"],"scene":"地","shot":"描述","dialogue":"话"}。剧本：${rawText}`;
        try {
            const resp = await fetch('https://api.deepseek.com', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [{role: "user", content: prompt}],
                    response_format: { type: 'json_object' }
                })
            });
            const res = await resp.json();
            const data = JSON.parse(res.choices[0].message.content);
            
            // 资产登记
            const proj = appData.projects[appData.currentId];
            data.roles.forEach(r => {
                if(!proj.assets.roles[r]) proj.assets.roles[r] = `@角色_${Object.keys(proj.assets.roles).length + 1}`;
            });
            if(data.scene && !proj.assets.scenes[data.scene]) {
                proj.assets.scenes[data.scene] = `@场景_${Object.keys(proj.assets.scenes).length + 1}`;
            }
            proj.shots.push(data);
            renderShots();
            renderAssetLibrary();
        } catch (e) { console.error(e); }
    }

    // 3. 渲染函数
    function renderAssetLibrary() {
        const proj = appData.projects[appData.currentId];
        const lib = document.getElementById('assetLibrary');
        let html = '';
        for(let name in proj.assets.roles) html += `<div class="asset-card role"><b>${name}</b><br><small>${proj.assets.roles[name]}</small></div>`;
        for(let name in proj.assets.scenes) html += `<div class="asset-card scene"><b>${name}</b><br><small>${proj.assets.scenes[name]}</small></div>`;
        lib.innerHTML = html || '<div style="color:#444;text-align:center;padding:20px;">暂无资产</div>';
    }

    function renderShots() {
        const proj = appData.projects[appData.currentId];
        document.getElementById('shotList').innerHTML = proj.shots.map((s, i) => `
            <div class="segment-block">
                <div style="color:var(--accent);font-size:12px">画面 ${i+1} - ${s.scene}</div>
                <div class="field-content">${highlight(s.shot)}</div>
                <div style="font-size:11px; margin-top:5px; color:#666">台词：${s.dialogue}</div>
            </div>
        `).join('');
    }

    function highlight(text) {
        const proj = appData.projects[appData.currentId];
        Object.keys(proj.assets.roles).forEach(name => {
            text = text.split(name).join(`<span class="color-role">${name}</span>`);
        });
        return text;
    }

    function updateProgress(curr, total) {
        document.getElementById('progressFill').style.width = (curr/total*100) + '%';
    }
</script>
</body>
</html>
